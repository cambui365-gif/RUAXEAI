name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Setup Android project
        run: |
          cd tablet-app
          rm -rf android ios windows linux macos web
          flutter create --org com.ruaxeai --project-name ruaxeai_tablet --platforms android .
          
          # Patch AndroidManifest for kiosk mode (portrait now)
          sed -i 's|android:name=".MainActivity"|android:name=".MainActivity"\n            android:screenOrientation="portrait"\n            android:keepScreenOn="true"|' android/app/src/main/AndroidManifest.xml
          
          # Add permissions
          sed -i '/<application/i\    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.WAKE_LOCK"/>' android/app/src/main/AndroidManifest.xml
          
          # Update Kotlin version in settings.gradle for compatibility (need 2.0+ for wakelock_plus/flutter_tts)
          sed -i 's|org.jetbrains.kotlin.android" version "[^"]*"|org.jetbrains.kotlin.android" version "2.1.0"|' android/settings.gradle
          
          # Set Java 17 compatibility in build.gradle
          sed -i 's|sourceCompatibility.*|sourceCompatibility = JavaVersion.VERSION_17|' android/app/build.gradle
          sed -i 's|targetCompatibility.*|targetCompatibility = JavaVersion.VERSION_17|' android/app/build.gradle
          
          # Bump minSdk to 24 (required by flutter_tts)
          sed -i 's|minSdk = flutter.minSdkVersion|minSdk = 24|' android/app/build.gradle
          sed -i 's|minSdkVersion flutter.minSdkVersion|minSdkVersion 24|' android/app/build.gradle

      - name: Get dependencies
        run: cd tablet-app && flutter pub get

      - name: Build APK
        run: cd tablet-app && flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: RUAXEAI-tablet
          path: tablet-app/build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.${{ github.run_number }}
          name: "RUAXEAI Tablet v0.1.${{ github.run_number }}"
          files: tablet-app/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
