name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Recreate Android project files
        run: |
          cd tablet-app
          # Backup our custom files
          cp android/app/src/main/AndroidManifest.xml /tmp/AndroidManifest.xml
          cp android/app/src/main/kotlin/com/ruaxeai/app/MainActivity.kt /tmp/MainActivity.kt
          cp android/app/src/main/kotlin/com/ruaxeai/app/BootReceiver.kt /tmp/BootReceiver.kt
          cp android/app/src/main/res/values/styles.xml /tmp/styles.xml
          cp android/app/build.gradle /tmp/build.gradle.app
          
          # Remove android dir and recreate
          rm -rf android
          flutter create --org com.ruaxeai --project-name ruaxeai_tablet --platforms android .
          
          # Restore our custom files
          cp /tmp/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          mkdir -p android/app/src/main/kotlin/com/ruaxeai/app
          cp /tmp/MainActivity.kt android/app/src/main/kotlin/com/ruaxeai/app/MainActivity.kt
          cp /tmp/BootReceiver.kt android/app/src/main/kotlin/com/ruaxeai/app/BootReceiver.kt
          cp /tmp/styles.xml android/app/src/main/res/values/styles.xml
          cp /tmp/build.gradle.app android/app/build.gradle

      - name: Get dependencies
        run: cd tablet-app && flutter pub get

      - name: Build APK
        run: cd tablet-app && flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: RUAXEAI-tablet
          path: tablet-app/build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.${{ github.run_number }}
          name: "RUAXEAI Tablet v0.1.${{ github.run_number }}"
          files: tablet-app/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
