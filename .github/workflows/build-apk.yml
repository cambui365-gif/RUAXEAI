name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Setup Android project
        run: |
          cd tablet-app
          rm -rf android ios windows linux macos web
          flutter create --org com.ruaxeai --project-name ruaxeai_tablet --platforms android .
          
          # Patch AndroidManifest for kiosk mode
          sed -i 's|android:name=".MainActivity"|android:name=".MainActivity"\n            android:screenOrientation="landscape"\n            android:keepScreenOn="true"|' android/app/src/main/AndroidManifest.xml
          
          # Add permissions
          sed -i '/<application/i\    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.WAKE_LOCK"/>' android/app/src/main/AndroidManifest.xml
          
          # Update Kotlin version in settings.gradle for compatibility
          sed -i 's|org.jetbrains.kotlin.android" version "[^"]*"|org.jetbrains.kotlin.android" version "1.9.22"|' android/settings.gradle

      - name: Get dependencies
        run: cd tablet-app && flutter pub get

      - name: Build APK
        run: cd tablet-app && flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: RUAXEAI-tablet
          path: tablet-app/build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.${{ github.run_number }}
          name: "RUAXEAI Tablet v0.1.${{ github.run_number }}"
          files: tablet-app/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
